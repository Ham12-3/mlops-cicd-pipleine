# PR pipeline: lint, type check, test, data tests, lightweight train+eval and metric gating.
name: PR

on:
  pull_request:
    branches: [master]

env:
  PYTHON_VERSION: "3.10"

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-pr-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-pr-

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "ruff==0.4.4" "black==24.2.0"
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests scripts

      - name: Black format check
        run: black --check src tests scripts

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-pr-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-pr-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Mypy
        run: mypy src --no-error-summary 2>/dev/null || true
        # Optional: remove "|| true" to fail PR on type errors once code is typed.

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-pr-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-pr-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pytest with coverage
        run: pytest tests --cov=src --cov-report=term-missing --cov-fail-under=0

  data-tests:
    name: Data & feature tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-pr-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-pr-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run data / feature tests
        run: pytest tests/test_data.py -v

  eval-gate:
    name: Eval & metric gating
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-pr-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-pr-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Lightweight training
        run: python -m src.train --out-dir artifacts --n-samples 800

      - name: Evaluate
        run: python -m src.evaluate --model-path artifacts/model.joblib --out metrics.json --n-samples 800

      - name: Compare to baseline
        run: python scripts/compare_metrics.py --new metrics.json --baseline baselines/metrics.json
